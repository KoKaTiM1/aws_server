name: Deploy Rust API

on:
  push:
    branches: [main, master]
    paths:
      - 'services/rust_api/**'
      - 'infra/db/migrations/**'
      - '.github/workflows/deploy-rust-api.yml'

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::937115287175:role/eyedar-prod-github-actions-deployer
          aws-region: us-east-1

      - name: Build and push Docker image
        run: |
          cd services/rust_api
          docker build -t eyedar-prod-rust-api:${{ github.sha }} .
          aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 937115287175.dkr.ecr.us-east-1.amazonaws.com
          docker tag eyedar-prod-rust-api:${{ github.sha }} 937115287175.dkr.ecr.us-east-1.amazonaws.com/eyedar-prod-rust-api:${{ github.sha }}
          docker push 937115287175.dkr.ecr.us-east-1.amazonaws.com/eyedar-prod-rust-api:${{ github.sha }}

      - name: Update ECS service
        run: |
          aws ecs update-service \
            --cluster eyedar-prod \
            --service eyedar-prod-rust-api \
            --force-new-deployment \
            --region us-east-1

      - name: Wait for deployment
        run: |
          aws ecs wait services-stable \
            --cluster eyedar-prod \
            --services eyedar-prod-rust-api \
            --region us-east-1
          echo "✅ Deployment stable"
