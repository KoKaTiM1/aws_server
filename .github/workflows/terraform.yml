name: Terraform Plan & Apply

on:
  push:
    branches:
      - main
    paths:
      - 'infra/**'
      - '.github/workflows/terraform.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'infra/**'
  workflow_dispatch:
    inputs:
      action:
        description: 'Terraform action to perform'
        required: true
        default: 'plan'
        type: choice
        options:
          - plan
          - apply
          - destroy

env:
  AWS_REGION: us-east-1
  TF_VERSION: 1.5.0
  TF_LOG: INFO

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/envs/prod

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID_A }}:role/eyedar-prod-github-actions-deployer
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        run: terraform fmt -check -recursive ../../
        continue-on-error: true

      - name: Recreate Terraform Backend (For Destroy)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'destroy'
        run: |
          REGION="${{ env.AWS_REGION }}"
          BUCKET="eyedar-prod-terraform-state"
          TABLE="eyedar-prod-terraform-locks"

          echo "Creating S3 bucket for Terraform state..."
          aws s3 mb s3://$BUCKET --region $REGION 2>&1 | grep -v "BucketAlreadyOwnedByYou\|BucketAlreadyExists" || true

          echo "Enabling versioning on S3 bucket..."
          aws s3api put-bucket-versioning --bucket $BUCKET --versioning-configuration Status=Enabled --region $REGION 2>/dev/null || true

          echo "Enabling encryption on S3 bucket..."
          aws s3api put-bucket-encryption --bucket $BUCKET --server-side-encryption-configuration '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}' --region $REGION 2>/dev/null || true

          echo "Creating DynamoDB table for Terraform locks..."
          aws dynamodb create-table \
            --table-name $TABLE \
            --attribute-definitions AttributeName=LockID,AttributeType=S \
            --key-schema AttributeName=LockID,KeyType=HASH \
            --billing-mode PAY_PER_REQUEST \
            --region $REGION 2>&1 | grep -v "ResourceInUseException" || true

          echo "Clearing all stale locks from DynamoDB..."
          aws dynamodb scan --table-name $TABLE --region $REGION --query 'Items[*].LockID.S' --output text 2>/dev/null | tr '\t' '\n' | while read lock_id; do
            if [ -n "$lock_id" ]; then
              echo "Deleting lock: $lock_id"
              aws dynamodb delete-item --table-name $TABLE --key "{\"LockID\":{\"S\":\"$lock_id\"}}" --region $REGION 2>/dev/null || true
            fi
          done

          echo "Backend recreation completed"

      - name: Terraform Init


        run: terraform init
        env:
          TF_LOG: DEBUG

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -lock=false -out=tfplan
        id: plan
        env:
          TF_VAR_domain_name: "example.com"
          TF_VAR_hosted_zone_id: "Z1234567890ABC"
          TF_VAR_budget_alert_emails: '["admin@example.com"]'
          TF_VAR_github_org: "KoKaTiM1"
          TF_VAR_github_repo: "aws_server"

      - name: Cleanup Conflicting Resources (Pre-Apply)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply'
        run: |
          REGION="${{ env.AWS_REGION }}"

          echo "Removing Secrets Manager secrets scheduled for deletion..."
          for secret in eyedar-prod-db-password-v3 eyedar-prod-firebase-key-v3 eyedar-prod-api-keys-v3; do
            aws secretsmanager delete-secret --secret-id $secret --force-delete-without-recovery --region $REGION 2>&1 | grep -v "ResourceNotFoundException" || true
          done

          echo "Removing SQS queues with conflicting KMS key..."
          for queue_url in $(aws sqs list-queues --region $REGION --query 'QueueUrls[]' --output text 2>/dev/null); do
            echo "Deleting SQS queue: $queue_url"
            aws sqs delete-queue --queue-url $queue_url --region $REGION 2>&1 | grep -v "NonExistentQueue" || true
          done

          echo "Removing RDS DB subnet groups..."
          for db_sg in $(aws rds describe-db-subnet-groups --region $REGION --query 'DBSubnetGroups[].DBSubnetGroupName' --output text 2>/dev/null); do
            echo "Deleting RDS DB subnet group: $db_sg"
            aws rds delete-db-subnet-group --db-subnet-group-name $db_sg --region $REGION 2>&1 | grep -v "DBSubnetGroupNotFoundFault\|InvalidDBSubnetGroupStateFault" || true
          done

          echo "Cleanup completed"



      - name: Comment PR with Plan
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            const plan = 'Terraform plan generated. Review the plan before merging.';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '```\n' + plan + '\n```'
            });

      - name: Terraform Apply
        if: (github.ref == 'refs/heads/main' && github.event_name == 'push') || (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply')
        run: terraform apply -auto-approve tfplan
        env:
          TF_VAR_domain_name: "example.com"
          TF_VAR_hosted_zone_id: "Z1234567890ABC"
          TF_VAR_budget_alert_emails: '["admin@example.com"]'
          TF_VAR_github_org: "KoKaTiM1"
          TF_VAR_github_repo: "aws_server"

      - name: Cleanup AWS Resources (Manual)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'destroy'
        run: |
          CLUSTER="eyedar-prod"
          REGION="${{ env.AWS_REGION }}"

          echo "=== Diagnostic: Checking what's using the subnets ==="
          for subnet_id in subnet-02adf092fc9e0c6c7 subnet-0fb9d98c90e2dbcee; do
            echo "Checking dependencies for subnet: $subnet_id"
            aws ec2 describe-network-interfaces --filters "Name=subnet-id,Values=$subnet_id" --region $REGION --query 'NetworkInterfaces[].{ID:NetworkInterfaceId,Type:InterfaceType,Status:Status,Description:Description,Attachment:Attachment}' 2>/dev/null || true
          done

          echo "=== Step 1: Deleting ECS services ==="
          for service in eyedar-prod-api eyedar-prod-worker-ingest eyedar-prod-worker-verify eyedar-prod-worker-notify eyedar-prod-rust-api eyedar-prod-mqtt-monitor; do
            echo "Deleting service: $service"
            aws ecs delete-service --cluster $CLUSTER --service $service --force --region $REGION 2>&1 | grep -v "ResourceNotFoundException" || true
          done

          echo "=== Step 2: Waiting for ECS tasks to stop (180 seconds) ==="
          sleep 180

          echo "=== Step 3: Deleting ECS cluster ==="
          aws ecs delete-cluster --cluster $CLUSTER --region $REGION 2>&1 | grep -v "ClusterNotFoundException" || true

          echo "=== Step 4: Deleting RDS database instances ==="
          for db_instance in $(aws rds describe-db-instances --region $REGION --query 'DBInstances[].DBInstanceIdentifier' --output text 2>/dev/null); do
            echo "Deleting RDS instance: $db_instance"
            aws rds delete-db-instance --db-instance-identifier $db_instance --skip-final-snapshot --region $REGION 2>&1 | grep -v "DBInstanceNotFound\|InvalidDBInstanceState" || true
          done

          echo "=== Step 5: Deleting ElastiCache replication groups ==="
          for repl_group in $(aws elasticache describe-replication-groups --region $REGION --query 'ReplicationGroups[?Status!=`deleting`].ReplicationGroupId' --output text 2>/dev/null); do
            echo "Deleting ElastiCache replication group: $repl_group"
            aws elasticache delete-replication-group --replication-group-id $repl_group --region $REGION 2>&1 | grep -v "ReplicationGroupNotFound" || true
          done

          echo "=== Step 6: Waiting for RDS and ElastiCache deletion (120 seconds) ==="
          sleep 120

          echo "=== Step 6b: Deleting all subnets in VPC ==="
          for subnet in $(aws ec2 describe-subnets --region $REGION --query 'Subnets[].SubnetId' --output text 2>/dev/null); do
            echo "Deleting subnet: $subnet"
            aws ec2 delete-subnet --subnet-id $subnet --region $REGION 2>&1 | grep -v "InvalidSubnetID\|DependencyViolation" || true
          done

          echo "=== Step 7: Deleting ElastiCache subnet groups ==="
          for subnet_group in $(aws elasticache describe-cache-subnet-groups --region $REGION --query 'CacheSubnetGroups[].CacheSubnetGroupName' --output text 2>/dev/null); do
            echo "Deleting ElastiCache subnet group: $subnet_group"
            aws elasticache delete-cache-subnet-group --cache-subnet-group-name $subnet_group --region $REGION 2>&1 | grep -v "CacheSubnetGroupNotFoundFault\|InvalidCacheSubnetGroupStateFault" || true
          done

          echo "=== Step 8: Deleting target groups ==="
          for tg_arn in $(aws elbv2 describe-target-groups --region $REGION --query 'TargetGroups[].TargetGroupArn' --output text 2>/dev/null); do
            echo "Deleting target group: $tg_arn"
            aws elbv2 delete-target-group --target-group-arn $tg_arn --region $REGION 2>&1 | grep -v "TargetGroupNotFound" || true
          done

          echo "=== Step 9: Deleting load balancers ==="
          for alb_arn in $(aws elbv2 describe-load-balancers --region $REGION --query 'LoadBalancers[].LoadBalancerArn' --output text 2>/dev/null); do
            echo "Deleting load balancer: $alb_arn"
            aws elbv2 delete-load-balancer --load-balancer-arn $alb_arn --region $REGION 2>&1 | grep -v "LoadBalancerNotFoundException" || true
          done

          echo "=== Step 10: Deleting VPC endpoints ==="
          for vpce in $(aws ec2 describe-vpc-endpoints --region $REGION --query 'VpcEndpoints[].VpcEndpointId' --output text 2>/dev/null); do
            echo "Deleting VPC endpoint: $vpce"
            aws ec2 delete-vpc-endpoints --vpc-endpoint-ids $vpce --region $REGION 2>&1 | grep -v "InvalidVpcEndpointId" || true
          done

          echo "=== Step 11: Deleting custom route tables ==="
          for rt in $(aws ec2 describe-route-tables --region $REGION --query 'RouteTables[?Associations[0].Main!=`true`].RouteTableId' --output text 2>/dev/null); do
            echo "Deleting route table: $rt"
            # First disassociate from subnets
            for assoc in $(aws ec2 describe-route-tables --route-table-ids $rt --region $REGION --query 'RouteTables[0].Associations[?Main!=`true`].RouteTableAssociationId' --output text 2>/dev/null); do
              aws ec2 disassociate-route-table --association-id $assoc --region $REGION 2>&1 | grep -v "InvalidAssociationID" || true
            done
            aws ec2 delete-route-table --route-table-id $rt --region $REGION 2>&1 | grep -v "InvalidRouteTableID\|DependencyViolation" || true
          done

          echo "=== Step 12: Deleting custom network ACLs ==="
          for nacl in $(aws ec2 describe-network-acls --region $REGION --query 'NetworkAcls[?IsDefault!=`true`].NetworkAclId' --output text 2>/dev/null); do
            echo "Deleting network ACL: $nacl"
            aws ec2 delete-network-acl --network-acl-id $nacl --region $REGION 2>&1 | grep -v "InvalidNetworkAclID\|DependencyViolation" || true
          done

          echo "=== Step 13: Releasing Elastic IPs ==="
          for alloc_id in $(aws ec2 describe-addresses --region $REGION --query 'Addresses[].AllocationId' --output text 2>/dev/null); do
            echo "Releasing EIP: $alloc_id"
            aws ec2 release-address --allocation-id $alloc_id --region $REGION 2>&1 | grep -v "InvalidAllocationID" || true
          done

          echo "=== Step 14: Waiting for propagation (30 seconds) ==="
          sleep 30

          echo "=== Diagnostic: Checking ALL remaining resources in VPC ==="
          VPC_ID=$(aws ec2 describe-vpcs --region $REGION --query 'Vpcs[0].VpcId' --output text 2>/dev/null)
          if [ -n "$VPC_ID" ] && [ "$VPC_ID" != "None" ]; then
            echo "VPC ID: $VPC_ID"

            echo "--- Network Interfaces in VPC ---"
            aws ec2 describe-network-interfaces --filters "Name=vpc-id,Values=$VPC_ID" --region $REGION --query 'NetworkInterfaces[].{ID:NetworkInterfaceId,Type:InterfaceType,Status:Status,Description:Description}' 2>/dev/null || true

            echo "--- Security Groups in VPC ---"
            aws ec2 describe-security-groups --filters "Name=vpc-id,Values=$VPC_ID" --region $REGION --query 'SecurityGroups[].{ID:GroupId,Name:GroupName,IngressRules:IpPermissions,EgressRules:IpPermissionsEgress}' 2>/dev/null || true

            echo "--- Route Tables in VPC ---"
            aws ec2 describe-route-tables --filters "Name=vpc-id,Values=$VPC_ID" --region $REGION --query 'RouteTables[].{ID:RouteTableId,Routes:Routes,Associations:Associations}' 2>/dev/null || true

            echo "--- Network ACLs in VPC ---"
            aws ec2 describe-network-acls --filters "Name=vpc-id,Values=$VPC_ID" --region $REGION --query 'NetworkAcls[].{ID:NetworkAclId,Entries:Entries}' 2>/dev/null || true

            echo "--- VPC Endpoints in VPC ---"
            aws ec2 describe-vpc-endpoints --filters "Name=vpc-id,Values=$VPC_ID" --region $REGION --query 'VpcEndpoints[].{ID:VpcEndpointId,ServiceName:ServiceName,State:State}' 2>/dev/null || true
          fi

          echo "=== Step 15: Deleting VPCs manually to avoid terraform errors ==="
          for vpc in $(aws ec2 describe-vpcs --region $REGION --query 'Vpcs[].VpcId' --output text 2>/dev/null); do
            echo "Deleting VPC: $vpc"
            aws ec2 delete-vpc --vpc-id $vpc --region $REGION 2>&1 | grep -v "InvalidVpcID\|DependencyViolation" || true
          done

          echo "=== Cleanup completed ==="

      - name: Terraform Destroy (Manual)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'destroy'
        run: terraform destroy -auto-approve -lock=false
        env:
          TF_LOG: DEBUG
          TF_VAR_domain_name: "example.com"
          TF_VAR_hosted_zone_id: "Z1234567890ABC"
          TF_VAR_budget_alert_emails: '["admin@example.com"]'
          TF_VAR_github_org: "KoKaTiM1"
          TF_VAR_github_repo: "aws_server"

      - name: Save Terraform Outputs
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          echo "=== Infrastructure Outputs ===" > /tmp/outputs.txt
          terraform output >> /tmp/outputs.txt 2>&1
          cat /tmp/outputs.txt

      - name: Upload Plan Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: infra/envs/prod/tfplan
          retention-days: 5

      - name: Notify on Failure
        if: failure()
        run: |
          echo "❌ Terraform ${{ github.event.inputs.action || 'plan' }} failed"
          echo "Check the logs above for details"
        shell: bash
