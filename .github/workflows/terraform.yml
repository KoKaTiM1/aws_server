name: Terraform Plan & Apply

on:
  push:
    branches:
      - main
    paths:
      - 'infra/**'
      - '.github/workflows/terraform.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'infra/**'
  workflow_dispatch:
    inputs:
      action:
        description: 'Terraform action to perform'
        required: true
        default: 'plan'
        type: choice
        options:
          - plan
          - apply
          - destroy

env:
  AWS_REGION: us-east-1
  TF_VERSION: 1.5.0
  TF_LOG: INFO

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/envs/prod

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID_A }}:role/eyedar-prod-github-actions-deployer
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        run: terraform fmt -check -recursive ../../
        continue-on-error: true

      - name: Recreate Terraform Backend (For Destroy)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'destroy'
        run: |
          REGION="${{ env.AWS_REGION }}"
          BUCKET="eyedar-prod-terraform-state"
          TABLE="eyedar-prod-terraform-locks"

          echo "Creating S3 bucket for Terraform state..."
          aws s3 mb s3://$BUCKET --region $REGION 2>&1 | grep -v "BucketAlreadyOwnedByYou\|BucketAlreadyExists" || true

          echo "Enabling versioning on S3 bucket..."
          aws s3api put-bucket-versioning --bucket $BUCKET --versioning-configuration Status=Enabled --region $REGION 2>/dev/null || true

          echo "Enabling encryption on S3 bucket..."
          aws s3api put-bucket-encryption --bucket $BUCKET --server-side-encryption-configuration '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}' --region $REGION 2>/dev/null || true

          echo "Creating DynamoDB table for Terraform locks..."
          aws dynamodb create-table \
            --table-name $TABLE \
            --attribute-definitions AttributeName=LockID,AttributeType=S \
            --key-schema AttributeName=LockID,KeyType=HASH \
            --billing-mode PAY_PER_REQUEST \
            --region $REGION 2>&1 | grep -v "ResourceInUseException" || true

          echo "Backend recreation completed"

      - name: Terraform Init

        run: terraform init
        env:
          TF_LOG: DEBUG

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -lock=false -out=tfplan
        id: plan
        env:
          TF_VAR_domain_name: "example.com"
          TF_VAR_hosted_zone_id: "Z1234567890ABC"
          TF_VAR_budget_alert_emails: '["admin@example.com"]'
          TF_VAR_github_org: "KoKaTiM1"
          TF_VAR_github_repo: "aws_server"

      - name: Comment PR with Plan
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            const plan = 'Terraform plan generated. Review the plan before merging.';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '```\n' + plan + '\n```'
            });

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: terraform apply -auto-approve tfplan
        env:
          TF_VAR_domain_name: "example.com"
          TF_VAR_hosted_zone_id: "Z1234567890ABC"
          TF_VAR_budget_alert_emails: '["admin@example.com"]'
          TF_VAR_github_org: "KoKaTiM1"
          TF_VAR_github_repo: "aws_server"

      - name: Cleanup AWS Resources (Manual)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'destroy'
        run: |
          CLUSTER="eyedar-prod"
          REGION="${{ env.AWS_REGION }}"

          echo "=== Step 1: Deleting ECS services ==="
          for service in eyedar-prod-api eyedar-prod-worker-ingest eyedar-prod-worker-verify eyedar-prod-worker-notify eyedar-prod-rust-api eyedar-prod-mqtt-monitor; do
            echo "Deleting service: $service"
            aws ecs delete-service --cluster $CLUSTER --service $service --force --region $REGION 2>&1 | grep -v "ResourceNotFoundException" || true
          done

          echo "=== Step 2: Waiting for ECS tasks to stop (60 seconds) ==="
          sleep 60

          echo "=== Step 3: Deleting ECS cluster ==="
          aws ecs delete-cluster --cluster $CLUSTER --region $REGION 2>&1 | grep -v "ClusterNotFoundException" || true

          echo "=== Step 4: Deleting ElastiCache replication groups ==="
          for repl_group in $(aws elasticache describe-replication-groups --region $REGION --query 'ReplicationGroups[?Status!=`deleting`].ReplicationGroupId' --output text 2>/dev/null); do
            echo "Deleting ElastiCache replication group: $repl_group"
            aws elasticache delete-replication-group --replication-group-id $repl_group --region $REGION 2>&1 | grep -v "ReplicationGroupNotFound" || true
          done

          echo "=== Step 5: Waiting for replication group to fully delete (120 seconds) ==="
          sleep 120

          echo "=== Step 6: Deleting ElastiCache subnet groups ==="
          for subnet_group in $(aws elasticache describe-cache-subnet-groups --region $REGION --query 'CacheSubnetGroups[].CacheSubnetGroupName' --output text 2>/dev/null); do
            echo "Deleting ElastiCache subnet group: $subnet_group"
            aws elasticache delete-cache-subnet-group --cache-subnet-group-name $subnet_group --region $REGION 2>&1 | grep -v "CacheSubnetGroupNotFoundFault\|InvalidCacheSubnetGroupStateFault" || true
          done

          echo "=== Step 7: Releasing Elastic IPs ==="
          for alloc_id in $(aws ec2 describe-addresses --region $REGION --query 'Addresses[].AllocationId' --output text 2>/dev/null); do
            echo "Releasing EIP: $alloc_id"
            aws ec2 release-address --allocation-id $alloc_id --region $REGION 2>&1 | grep -v "InvalidAllocationID" || true
          done

          echo "=== Step 8: Deleting all Network Interfaces (including in-use) ==="
          for eni in $(aws ec2 describe-network-interfaces --region $REGION --query 'NetworkInterfaces[].NetworkInterfaceId' --output text 2>/dev/null); do
            echo "Deleting ENI: $eni"
            # Detach if attached
            attach_id=$(aws ec2 describe-network-interfaces --network-interface-ids $eni --region $REGION --query 'NetworkInterfaces[0].Attachment.AttachmentId' --output text 2>/dev/null)
            if [ "$attach_id" != "None" ] && [ -n "$attach_id" ]; then
              aws ec2 detach-network-interface --attachment-id $attach_id --region $REGION 2>/dev/null || true
              sleep 5
            fi
            # Then delete
            aws ec2 delete-network-interface --network-interface-id $eni --region $REGION 2>&1 | grep -v "InvalidNetworkInterfaceID\|InvalidNetworkInterfaceInUse" || true
          done

          echo "=== Step 9: Waiting for propagation (30 seconds) ==="
          sleep 30

          echo "=== Cleanup completed ==="

      - name: Terraform Destroy (Manual)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'destroy'
        run: terraform destroy -auto-approve -lock=false
        env:
          TF_LOG: DEBUG
          TF_VAR_domain_name: "example.com"
          TF_VAR_hosted_zone_id: "Z1234567890ABC"
          TF_VAR_budget_alert_emails: '["admin@example.com"]'
          TF_VAR_github_org: "KoKaTiM1"
          TF_VAR_github_repo: "aws_server"

      - name: Save Terraform Outputs
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          echo "=== Infrastructure Outputs ===" > /tmp/outputs.txt
          terraform output >> /tmp/outputs.txt 2>&1
          cat /tmp/outputs.txt

      - name: Upload Plan Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: infra/envs/prod/tfplan
          retention-days: 5

      - name: Notify on Failure
        if: failure()
        run: |
          echo "❌ Terraform ${{ github.event.inputs.action || 'plan' }} failed"
          echo "Check the logs above for details"
        shell: bash
