name: Terraform Plan & Apply

on:
  push:
    branches:
      - main
    paths:
      - 'infra/**'
      - '.github/workflows/terraform.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'infra/**'
  workflow_dispatch:
    inputs:
      action:
        description: 'Terraform action to perform'
        required: true
        default: 'plan'
        type: choice
        options:
          - plan
          - apply
          - destroy

env:
  AWS_REGION: us-east-1
  TF_VERSION: 1.5.0
  TF_LOG: INFO

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/envs/prod

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID_A }}:role/eyedar-prod-github-actions-deployer
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        run: terraform fmt -check -recursive ../../
        continue-on-error: true

      - name: Terraform Init
        run: terraform init
        env:
          TF_LOG: DEBUG

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -lock=false -out=tfplan
        id: plan
        env:
          TF_VAR_domain_name: "example.com"
          TF_VAR_hosted_zone_id: "Z1234567890ABC"
          TF_VAR_budget_alert_emails: '["admin@example.com"]'
          TF_VAR_github_org: "KoKaTiM1"
          TF_VAR_github_repo: "aws_server"

      - name: Comment PR with Plan
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            const plan = 'Terraform plan generated. Review the plan before merging.';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '```\n' + plan + '\n```'
            });

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: terraform apply -auto-approve tfplan
        env:
          TF_VAR_domain_name: "example.com"
          TF_VAR_hosted_zone_id: "Z1234567890ABC"
          TF_VAR_budget_alert_emails: '["admin@example.com"]'
          TF_VAR_github_org: "KoKaTiM1"
          TF_VAR_github_repo: "aws_server"

      - name: Cleanup AWS Resources (Manual)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'destroy'
        run: |
          CLUSTER="eyedar-prod"
          REGION="${{ env.AWS_REGION }}"

          echo "Deleting ECS services..."
          for service in eyedar-prod-api eyedar-prod-worker-ingest eyedar-prod-worker-verify eyedar-prod-worker-notify eyedar-prod-rust-api eyedar-prod-mqtt-monitor; do
            aws ecs delete-service --cluster $CLUSTER --service $service --force --region $REGION 2>/dev/null || true
          done

          echo "Deleting ElastiCache cluster..."
          aws elasticache delete-cache-cluster --cache-cluster-id eyedar-prod-redis --skip-final-snapshot --region $REGION 2>/dev/null || true

          echo "Releasing Elastic IPs..."
          for alloc_id in $(aws ec2 describe-addresses --region $REGION --query 'Addresses[?Tags[?Key==`Name` && contains(Value, `eyedar`)]].AllocationId' --output text 2>/dev/null); do
            aws ec2 release-address --allocation-id $alloc_id --region $REGION 2>/dev/null || true
          done

          echo "Deleting network interfaces..."
          for eni in $(aws ec2 describe-network-interfaces --region $REGION --filters "Name=tag:Name,Values=*eyedar*" --query 'NetworkInterfaces[].NetworkInterfaceId' --output text 2>/dev/null); do
            aws ec2 delete-network-interface --network-interface-id $eni --region $REGION 2>/dev/null || true
          done

          echo "Waiting 30 seconds for cleanup to propagate..."
          sleep 30

      - name: Terraform Destroy (Manual)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'destroy'
        run: terraform destroy -auto-approve -lock=false
        env:
          TF_LOG: DEBUG
          TF_VAR_domain_name: "example.com"
          TF_VAR_hosted_zone_id: "Z1234567890ABC"
          TF_VAR_budget_alert_emails: '["admin@example.com"]'
          TF_VAR_github_org: "KoKaTiM1"
          TF_VAR_github_repo: "aws_server"

      - name: Save Terraform Outputs
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          echo "=== Infrastructure Outputs ===" > /tmp/outputs.txt
          terraform output >> /tmp/outputs.txt 2>&1
          cat /tmp/outputs.txt

      - name: Upload Plan Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: infra/envs/prod/tfplan
          retention-days: 5

      - name: Notify on Failure
        if: failure()
        run: |
          echo "❌ Terraform ${{ github.event.inputs.action || 'plan' }} failed"
          echo "Check the logs above for details"
        shell: bash
